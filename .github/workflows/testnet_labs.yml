name: okx-testnet-lab

on:
  workflow_dispatch:          # manual, se puede cambiar a schedule o push
  # schedule:
  #   - cron: '0 */6 * * *'   # cada 6 horas, ejemplo

jobs:
  lab:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lab (unbuffered)
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
        run: |
          python -u main.py

      - name: Upload artifacts
        if: always()            # subir incluso si falla
        uses: actions/upload-artifact@v4
        with:
          name: okx-lab-results
          path: artifacts/
